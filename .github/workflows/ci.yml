name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: calsight
          POSTGRES_PASSWORD: calsight_dev
          POSTGRES_DB: calsight
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: ruff check .
      - name: Run unit tests
        run: pytest -m "not integration"
      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgresql://calsight:calsight_dev@localhost:5433/calsight_test
          TEST_DATABASE_ADMIN_URL: postgresql://calsight:calsight_dev@localhost:5433/postgres
        run: pytest -m integration

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npx eslint .
      - run: npx tsc --noEmit
      - run: npm test
