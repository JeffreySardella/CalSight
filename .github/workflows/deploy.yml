name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Create backend .env from secrets
        run: |
          cat > backend/.env << 'DELIM'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          CENSUS_API_KEY=${{ secrets.CENSUS_API_KEY }}
          NOAA_API_TOKEN=${{ secrets.NOAA_API_TOKEN }}
          BLS_API_KEY=${{ secrets.BLS_API_KEY }}
          DEBUG=false
          DELIM

      - name: Build and restart backend
        run: docker compose -f docker-compose.prod.yml up --build -d

      - name: Verify backend is healthy
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf http://127.0.0.1:8000/docs > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 5
          done
          echo "Backend failed to start"
          docker compose -f docker-compose.prod.yml logs backend
          exit 1
