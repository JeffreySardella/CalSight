services:
  # Optional local Postgres. Disabled by default — backend uses the Azure DB
  # from backend/.env. To run locally, start with: docker-compose --profile local-db up
  db:
    profiles: ["local-db"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: calsight
      POSTGRES_USER: calsight
      POSTGRES_PASSWORD: calsight_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calsight"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "0.0.0.0:8000:8000"
    env_file:
      - ./backend/.env
    environment:
      CORS_ORIGINS: http://localhost:5180
      DEBUG: "true"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "0.0.0.0:5180:5173"
    depends_on:
      - backend
    environment:
      VITE_API_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
